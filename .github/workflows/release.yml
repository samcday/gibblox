name: Release

on:
  push:
    branches:
      - "release/v*"
    tags:
      - "*"

permissions:
  contents: write
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.detect.outputs.enabled }}
      mode: ${{ steps.detect.outputs.mode }}
      prerelease: ${{ steps.detect.outputs.prerelease }}
    steps:
      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          enabled=false
          mode=none
          prerelease=false
          ref_name=""

          if [[ "$EVENT_NAME" == "push" ]] \
            && [[ "$REF_TYPE" == "tag" ]] \
            && [[ "$REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            enabled=true
            mode=tag
            ref_name="$REF_NAME"
          elif [[ "$EVENT_NAME" == "push" ]] \
            && [[ "$REF_TYPE" == "branch" ]] \
            && [[ "$REF_NAME" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            enabled=true
            mode=pr
            ref_name="${REF_NAME#release/v}"
          fi

          if [[ -n "$ref_name" && "$ref_name" =~ -rc\.[0-9]+$ ]]; then
            prerelease=true
          fi

          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  release:
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: needs.gate.outputs.mode == 'tag'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ needs.gate.outputs.prerelease }}
          draft: true
          token: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
      - if: needs.gate.outputs.mode == 'pr'
        run: |
          echo "release/v* branch mode: skipping draft creation"

  ci:
    needs: [gate, release]
    if: needs.gate.outputs.enabled == 'true'
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  publish-crates:
    needs: [gate, release, ci]
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@just
      - if: needs.gate.outputs.mode == 'pr'
        name: Validate crate publish (dry-run)
        run: just publish-dry-run
      - if: needs.gate.outputs.mode == 'tag'
        name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: just publish

  publish-cli-binaries:
    needs: [gate, release, ci]
    if: needs.gate.outputs.mode == 'tag'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: gibblox-cli
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          token: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}

  pass:
    name: ✅ Pass
    needs: [gate, release, ci, publish-crates, publish-cli-binaries]
    runs-on: ubuntu-latest
    if: always() && needs.gate.outputs.enabled == 'true'
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: publish-cli-binaries
          jobs: ${{ toJSON(needs) }}

  publish-release:
    needs: [gate, release, pass]
    if: needs.gate.outputs.mode == 'tag' && needs.pass.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --draft=false >/dev/null

          draft_state="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" --jq '.draft')"
          if [[ "$draft_state" != "false" ]]; then
            echo "::error::release ${TAG_NAME} is still marked as draft"
            exit 1
          fi
