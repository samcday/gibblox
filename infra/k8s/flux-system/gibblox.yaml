apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gibblox
  namespace: flux-system
spec:
  interval: 5m
  ref:
    branch: main
  url: https://github.com/samcday/gibblox
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gibblox
  namespace: flux-system
spec:
  interval: 5m
  path: ./infra/k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: gibblox
  timeout: 2m
